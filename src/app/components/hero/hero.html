<section class="hero">
    <div class="hero-grid"></div>
    <div class="hero-glow"></div>
    <div class="hero-content">
        <div class="badge">
            <span class="badge-pulse"></span>
            Available for opportunities
        </div>
        <h1>
            Vinith <span class="accent">S.</span>
        </h1>
        <p class="hero-sub">Full Stack Developer</p>
        <p class="hero-desc">
            3 years building scalable, high-performance web apps with
            <strong>.NET Core</strong>, <strong>Angular</strong>, and
            <strong>SQL</strong>. From insurance platforms to banking APIs —
            I ship clean architecture that lasts.
        </p>
        <div class="cta">
            <button class="btn btn-primary" (click)="downloadCV()">
                Download CV ↗
            </button>
            <a routerLink="/contact" class="btn btn-ghost">
                Get in Touch
            </a>
        </div>
        <div class="stats">
            <div class="stat">
                <div class="stat-num">3+</div>
                <div class="stat-label">Years Experience</div>
            </div>
            <div class="stat">
                <div class="stat-num">2</div>
                <div class="stat-label">Companies</div>
            </div>
            <div class="stat">
                <div class="stat-num">2+</div>
                <div class="stat-label">Major Projects</div>
            </div>
        </div>
    </div>
</section>
